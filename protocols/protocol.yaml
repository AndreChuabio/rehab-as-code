# Current rehab protocol for Andre (week 3 baseline; evaluator HRV hold).
# Cursor cloud agents update this via PR per .cursorrules.

patient: Andre
phase: post-ACL reconstruction
week: 3
generated_by: "care-plan-coordinator (intake: Andre, 26, ACL reconstruction ~3 wk, pain 3/10); researcher PRIMARY protocol-library/post-acl-week-3.yaml (week_range [3,3]); evaluator HOLD — wearable HRV rule: ~19 ms decline over 7 d vs prior window exceeds -8 ms threshold; hold entire protocol (no week-4 progression)."
last_updated: "2026-05-02"

session_targets:
  frequency_per_week: 3
  duration_min: 30
  max_pain_during_session: 3

exercises:
  - name: stationary_bike
    duration_min: 10
    intensity: "RPE 4 of 10"
    progression_criteria: "tolerates 12 min"
    regression_criteria: "patellofemoral pain mid-session"
    references:
      - protocol-library/post-acl-week-3.yaml

  - name: terminal_knee_extension
    sets: 3
    reps: 12
    load: yellow_band
    ROM_target_deg: 0
    progression_criteria: "matches contralateral extension"
    regression_criteria: "extension lag > 5 deg"
    references:
      - protocol-library/post-acl-week-3.yaml

  - name: quad_sets
    sets: 3
    reps: 15
    load: bodyweight
    ROM_target_deg: 90
    progression_criteria: "pain-free, no swelling next morning"
    regression_criteria: "any swelling within 24h"
    references:
      - protocol-library/post-acl-week-3.yaml

  - name: heel_slides
    sets: 3
    reps: 10
    ROM_target_deg: 100
    progression_criteria: "pain-free sustained 100° active flexion (library milestone); defer higher ROM until hold clears/clinician ok"
    regression_criteria: "ROM regression > 5 deg week-over-week"
    references:
      - protocol-library/post-acl-week-3.yaml
