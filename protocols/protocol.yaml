# Current rehab protocol for Andre.
# This file IS the patient's program. Cursor cloud agents update it weekly
# by opening a PR per the conventions in .cursorrules.

patient: Andre
phase: post-ACL reconstruction
week: 4
generated_by: planner
last_updated: 2026-05-02

session_targets:
  frequency_per_week: 4
  duration_min: 35
  max_pain_during_session: 3   # 0-10 scale, hard ceiling

exercises:
  - name: quad_sets
    sets: 3
    reps: 15
    load: bodyweight
    ROM_target_deg: 90
    progression_criteria: "pain-free, no swelling next morning"
    regression_criteria: "any swelling within 24h"
    references:
      - protocol-library/post-acl-week-3.yaml

  - name: heel_slides
    sets: 3
    reps: 10
    load: bodyweight
    ROM_target_deg: 100
    progression_criteria: "ROM > 100 deg, painless"
    regression_criteria: "ROM regression > 5 deg week-over-week"
    references:
      - protocol-library/post-acl-week-3.yaml

  - name: terminal_knee_extension
    sets: 3
    reps: 15
    load: green_band
    ROM_target_deg: 0   # full extension target
    progression_criteria: "pain-free 3x15 with green band; extension matches contralateral"
    regression_criteria: "extension lag > 5 deg or load intolerance (step band down before changing ROM)"
    references:
      - protocol-library/post-acl-week-3.yaml
      - protocol-library/post-acl-week-4.yaml

  - name: stationary_bike
    duration_min: 10
    intensity: "RPE 4 of 10"
    progression_criteria: "tolerates 12 min"
    regression_criteria: "patellofemoral pain mid-session"
    references:
      - protocol-library/post-acl-week-3.yaml
