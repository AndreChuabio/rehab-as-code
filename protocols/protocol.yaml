    references:
      - protocol-library/post-acl-week-3.yaml

  - name: terminal_knee_extension
    sets: 3
    reps: 12
    load: yellow_band
    ROM_target_deg: 0
    progression_criteria: "matches contralateral extension"
    regression_criteria: "extension lag > 5 deg"
    references:
      - protocol-library/post-acl-week-3.yaml

  - name: quad_sets
    sets: 3
    reps: 15
    load: bodyweight
    ROM_target_deg: 90
    progression_criteria: "pain-free, no swelling next morning"
    regression_criteria: "any swelling within 24h"
    references:
      - protocol-library/post-acl-week-3.yaml

  - name: heel_slides
    sets: 3
    reps: 10
    ROM_target_deg: 100
    progression_criteria: "pain-free sustained 100° active flexion (library milestone); defer higher ROM until hold clears/clinician ok"
    regression_criteria: "ROM regression > 5 deg week-over-week"
    references:
      - protocol-library/post-acl-week-3.yaml
