patient: Andre
phase: post-ACL reconstruction
week: 3
generated_by: "care-plan-coordinator; researcher PRIMARY protocol-library/post-acl-week-3.yaml (exercises/params only; no week-4 — clearance requires stable/improving HRV, not met); evaluator HOLD — HRV ~19 ms decline over 7d vs prior exceeds -8 ms threshold (entire protocol); sleep modifier — avg sleep score last 3 days <70 → session intensity -20% (stationary bike RPE 4→3 of 10)."
last_updated: "2026-05-03"

session_targets:
